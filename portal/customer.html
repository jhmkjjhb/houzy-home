<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOUZY HOME — 订单查询</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{'hg':'#1a3a2a','gd':'#c8a96e','gc':'#f5f2ed'}}}}</script>
</head>
<body class="bg-gc min-h-screen" style="font-family:'Noto Sans SC',sans-serif">

<!-- Header -->
<nav class="bg-hg shadow-md">
  <div class="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2">
      <div class="w-7 h-7 bg-gd flex items-center justify-center text-hg font-bold text-sm">H</div>
      <span class="text-white font-semibold text-sm tracking-wide">HOUZY HOME</span>
    </a>
    <span class="text-gd text-xs tracking-widest">订单查询</span>
  </div>
</nav>

<!-- Screen: phone input -->
<div id="s-phone" class="max-w-md mx-auto px-4 py-14">
  <div class="text-center mb-8">
    <div class="w-16 h-16 bg-hg rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-gd" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-hg mb-1">查询订单进度</h1>
    <p class="text-gray-500 text-sm">输入您登记的手机号码</p>
  </div>

  <div class="bg-white rounded-2xl shadow-sm p-6">
    <label class="block text-sm font-medium text-gray-700 mb-2">手机号码</label>
    <div class="flex gap-2 mb-4">
      <select id="country-code" class="border border-gray-200 rounded-lg px-2 py-3 text-sm bg-gray-50 focus:outline-none focus:border-hg flex-shrink-0" style="max-width:130px">
        <option value="60">🇲🇾 +60 MY</option>
        <option value="65">🇸🇬 +65 SG</option>
        <option value="86">🇨🇳 +86 CN</option>
        <option value="62">🇮🇩 +62 ID</option>
        <option value="66">🇹🇭 +66 TH</option>
        <option value="63">🇵🇭 +63 PH</option>
        <option value="84">🇻🇳 +84 VN</option>
        <option value="95">🇲🇲 +95 MM</option>
        <option value="855">🇰🇭 +855 KH</option>
        <option value="856">🇱🇦 +856 LA</option>
        <option value="673">🇧🇳 +673 BN</option>
        <option value="886">🇹🇼 +886 TW</option>
        <option value="852">🇭🇰 +852 HK</option>
        <option value="853">🇲🇴 +853 MO</option>
        <option value="81">🇯🇵 +81 JP</option>
        <option value="82">🇰🇷 +82 KR</option>
        <option value="91">🇮🇳 +91 IN</option>
        <option value="92">🇵🇰 +92 PK</option>
        <option value="94">🇱🇰 +94 LK</option>
        <option value="880">🇧🇩 +880 BD</option>
        <option value="977">🇳🇵 +977 NP</option>
        <option value="61">🇦🇺 +61 AU</option>
        <option value="64">🇳🇿 +64 NZ</option>
        <option value="1">🇺🇸 +1 US/CA</option>
        <option value="44">🇬🇧 +44 UK</option>
        <option value="49">🇩🇪 +49 DE</option>
        <option value="33">🇫🇷 +33 FR</option>
        <option value="39">🇮🇹 +39 IT</option>
        <option value="34">🇪🇸 +34 ES</option>
        <option value="31">🇳🇱 +31 NL</option>
        <option value="41">🇨🇭 +41 CH</option>
        <option value="971">🇦🇪 +971 AE</option>
        <option value="966">🇸🇦 +966 SA</option>
        <option value="974">🇶🇦 +974 QA</option>
        <option value="965">🇰🇼 +965 KW</option>
        <option value="27">🇿🇦 +27 ZA</option>
        <option value="55">🇧🇷 +55 BR</option>
      </select>
      <input type="tel" id="phone-in" placeholder="10-1234 5678" maxlength="15"
             class="flex-1 border border-gray-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-hg min-w-0"
             onkeydown="if(event.key==='Enter')searchOrders()">
    </div>
    <button onclick="searchOrders()" id="search-btn"
            class="w-full py-3 bg-hg text-white font-semibold rounded-lg hover:bg-green-900 transition text-sm">
      查询订单
    </button>
    <p id="phone-err" class="text-red-500 text-xs mt-2 hidden"></p>
  </div>

  <p class="text-center text-gray-400 text-xs mt-6">
    如需帮助请
    <a href="https://wa.me/60105898786" class="text-hg underline">WhatsApp 联系我们</a>
  </p>
</div>

<!-- Screen: orders list -->
<div id="s-orders" class="hidden max-w-2xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-lg font-bold text-hg">我的订单</h2>
    <button onclick="show('s-phone')" class="text-sm text-gray-400 hover:text-hg">← 重新查询</button>
  </div>
  <div id="orders-list"></div>
</div>

<!-- Screen: order detail -->
<div id="s-detail" class="hidden max-w-2xl mx-auto px-4 py-8">
  <div class="flex items-center justify-between mb-5">
    <h2 class="text-lg font-bold text-hg">订单详情</h2>
    <button onclick="show('s-orders')" class="text-sm text-gray-400 hover:text-hg">← 返回列表</button>
  </div>
  <div id="detail-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://csabbxiijzghooppayae.supabase.co';
const SB_KEY = 'sb_publishable__9KY2RRSxb1excfVxBTH_Q_5HtFWxmH';
const sb = supabase.createClient(SB_URL, SB_KEY);

let myPhone = '', myOrders = [];

const STATUS = {
  pending_payment:    { label:'待支付',     cls:'bg-yellow-100 text-yellow-800' },
  paid:               { label:'已支付',     cls:'bg-blue-100 text-blue-700' },
  assigned:           { label:'已分配厂家', cls:'bg-blue-100 text-blue-700' },
  accepted:           { label:'厂家已接单', cls:'bg-violet-100 text-violet-700' },
  in_production:      { label:'生产中',     cls:'bg-violet-100 text-violet-700' },
  production_complete:{ label:'生产完成',   cls:'bg-indigo-100 text-indigo-700' },
  shipped:            { label:'已发货',     cls:'bg-orange-100 text-orange-700' },
  in_transit:         { label:'运输中',     cls:'bg-orange-100 text-orange-700' },
  arrived:            { label:'已到货',     cls:'bg-teal-100 text-teal-700' },
  installing:         { label:'安装中',     cls:'bg-teal-100 text-teal-700' },
  completed:          { label:'已完成',     cls:'bg-green-100 text-green-700' },
  after_sales:        { label:'售后中',     cls:'bg-red-100 text-red-700' },
  closed:             { label:'已关闭',     cls:'bg-gray-100 text-gray-500' },
};

function show(id) {
  ['s-phone','s-orders','s-detail'].forEach(s =>
    document.getElementById(s).classList.toggle('hidden', s !== id)
  );
}

function badge(status) {
  const s = STATUS[status] || { label: status, cls: 'bg-gray-100 text-gray-600' };
  return `<span class="text-xs px-2 py-0.5 rounded-full font-medium ${s.cls}">${s.label}</span>`;
}

function fmtAmt(v) {
  return 'RM ' + Number(v).toLocaleString('en-MY', { minimumFractionDigits: 2 });
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('zh-CN', { year:'numeric', month:'short', day:'numeric' });
}

function fmtDateTime(d) {
  return new Date(d).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

async function searchOrders() {
  const raw = document.getElementById('phone-in').value.trim().replace(/[\s\-\(\)]/g, '');
  if (!raw) { showErr('请输入手机号码'); return; }
  const countryCode = document.getElementById('country-code').value;
  const phone = countryCode + raw.replace(/^0+/, '');

  const btn = document.getElementById('search-btn');
  const err = document.getElementById('phone-err');
  btn.textContent = '查询中...'; btn.disabled = true; err.classList.add('hidden');

  const { data, error } = await sb.rpc('get_orders_by_phone', { p_phone: phone });
  btn.textContent = '查询订单'; btn.disabled = false;

  if (error) { showErr('查询失败，请稍后再试'); return; }

  myPhone = phone;
  myOrders = data || [];
  renderOrders();
  show('s-orders');
}

function showErr(msg) {
  const e = document.getElementById('phone-err');
  e.textContent = msg; e.classList.remove('hidden');
}

function renderOrders() {
  const el = document.getElementById('orders-list');
  if (!myOrders.length) {
    el.innerHTML = `<div class="text-center py-16">
      <div class="text-5xl mb-3">📦</div>
      <p class="text-gray-500 font-medium">未找到相关订单</p>
      <p class="text-gray-400 text-sm mt-1">请确认手机号码，或联系我们</p>
      <a href="https://wa.me/60105898786" target="_blank"
         class="inline-block mt-4 px-5 py-2 bg-green-500 text-white text-sm rounded-lg">
        WhatsApp 联系客服
      </a>
    </div>`;
    return;
  }
  el.innerHTML = myOrders.map(o => `
    <div onclick="openDetail('${o.id}')"
         class="bg-white rounded-xl shadow-sm p-5 mb-3 cursor-pointer hover:shadow-md transition-shadow border border-gray-100 active:scale-[0.99]">
      <div class="flex items-start justify-between mb-2">
        <div>
          <div class="font-mono font-bold text-hg text-sm">${o.order_no}</div>
          <div class="text-gray-400 text-xs mt-0.5">${o.store_name} · ${fmtDate(o.created_at)}</div>
        </div>
        ${badge(o.status)}
      </div>
      ${o.description ? `<p class="text-gray-600 text-sm mb-3 line-clamp-2">${o.description}</p>` : ''}
      <div class="flex items-center justify-between pt-2 border-t border-gray-50">
        <span class="font-bold text-hg">${fmtAmt(o.amount)}</span>
        <span class="text-gray-400 text-xs flex items-center gap-1">
          查看进度
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </span>
      </div>
    </div>`).join('');
}

async function openDetail(id) {
  const o = myOrders.find(x => x.id === id);
  if (!o) return;
  document.getElementById('detail-content').innerHTML =
    `<div class="text-center py-10 text-gray-400">加载中…</div>`;
  show('s-detail');

  const { data: logs } = await sb.rpc('get_order_timeline', { p_order_id: id, p_phone: myPhone });

  const logsHtml = (logs || []).map((l, i, arr) => {
    const st = STATUS[l.status] || { label: l.status };
    const isLast = i === arr.length - 1;
    return `
    <div class="flex gap-3">
      <div class="flex flex-col items-center flex-shrink-0 w-5">
        <div class="w-3 h-3 rounded-full ${isLast ? 'bg-hg' : 'bg-gray-300'} mt-0.5"></div>
        ${!isLast ? '<div class="w-0.5 bg-gray-200 flex-1 my-1"></div>' : ''}
      </div>
      <div class="pb-4 flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="font-medium text-sm text-gray-800">${st.label}</span>
          <span class="text-gray-400 text-xs">${fmtDateTime(l.created_at)}</span>
        </div>
        ${l.notes ? `<p class="text-gray-500 text-sm mt-0.5">${l.notes}</p>` : ''}
        ${l.operator_name ? `<p class="text-gray-400 text-xs mt-0.5">${l.operator_name}</p>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('detail-content').innerHTML = `
    <!-- Info card -->
    <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
      <div class="flex items-start justify-between mb-4">
        <div>
          <div class="font-mono font-bold text-hg text-lg">${o.order_no}</div>
          <div class="text-gray-400 text-sm">${o.store_name}</div>
        </div>
        ${badge(o.status)}
      </div>
      ${o.description ? `<p class="text-gray-600 text-sm pb-3 mb-3 border-b border-gray-100">${o.description}</p>` : ''}
      <div class="space-y-2 text-sm">
        <div class="flex justify-between">
          <span class="text-gray-500">订单金额</span>
          <span class="font-bold text-hg text-base">${fmtAmt(o.amount)}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">支付状态</span>
          <span class="font-medium ${o.payment_status === 'paid' ? 'text-green-600' : 'text-red-500'}">
            ${o.payment_status === 'paid' ? '已支付 ✓' : '待支付'}
          </span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-500">创建时间</span>
          <span class="text-gray-700">${fmtDate(o.created_at)}</span>
        </div>
        ${o.completed_at ? `<div class="flex justify-between">
          <span class="text-gray-500">完成时间</span>
          <span class="text-gray-700">${fmtDate(o.completed_at)}</span>
        </div>` : ''}
      </div>
    </div>

    <!-- Timeline -->
    <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
      <h3 class="font-semibold text-gray-800 mb-4">订单进度</h3>
      ${logsHtml || '<p class="text-gray-400 text-sm">暂无进度记录</p>'}
    </div>

    <!-- WhatsApp CTA -->
    <a href="https://wa.me/60105898786?text=${encodeURIComponent('您好，我想查询订单 ' + o.order_no + ' 的状态')}"
       target="_blank"
       class="flex items-center justify-center gap-2 w-full py-3.5 bg-green-500 text-white font-semibold rounded-xl hover:bg-green-600 transition text-sm">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      WhatsApp 联系客服
    </a>`;
}
</script>
</body>
</html>
